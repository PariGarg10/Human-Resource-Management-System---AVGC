# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render Dashboard → New → Blueprint

services:
  - type: web
    name: avgc-hrms
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BIOMETRIC_API_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # ESSL device sync cannot run on Render (no LAN). Use office PC: npm run essl:bridge
      - key: ESSL_ENABLED
        value: "false"
