<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVGC · Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth-bundle.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-inner">
        <a href="/" class="auth-brand-logo-link" aria-label="AVGC home">AVGC</a>
        <h2>Choose a new password</h2>
        <p>Use at least 8 characters with letters and numbers.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Reset password</h1>
        <p class="subtitle">Enter and confirm your new password below.</p>
        <form id="resetPasswordForm">
          <label for="newPassword">New password</label>
          <input id="newPassword" name="newPassword" type="password" required autocomplete="new-password" minlength="8" placeholder="••••••••" />
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required autocomplete="new-password" minlength="8" placeholder="••••••••" />
          <p class="stat-sub" style="margin:0 0 14px;font-size:12px;">Minimum 8 characters, including at least one letter and one number.</p>
          <button type="submit" class="btn btn-primary" id="resetSubmitBtn">Update password</button>
        </form>
        <p id="resetMessage" class="message" role="status"></p>
        <p class="auth-back-link"><a href="/forgot-password">Request a new link</a> · <a href="/login">Sign in</a></p>
      </div>
    </div>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/reset-password.js"></script>
</body>
</html>
