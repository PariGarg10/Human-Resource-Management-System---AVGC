<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme_preference') || localStorage.getItem('hrms-theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
