<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme_preference') || localStorage.getItem('hrms-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee · AVGC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/assets/avgc-dashboard/employee-app.css" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/assets/avgc-dashboard/employee-app.js"></script>
</body>
</html>
