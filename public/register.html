<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVGC · Register</title>
  <link rel="stylesheet" href="/css/auth-bundle.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-inner">
        <a href="/" class="auth-brand-logo-link" aria-label="AVGC home">AVGC Studios</a>
        <h2>Join your organisation on AVGC HRMS</h2>
        <p>Create your account if your work email has already been onboarded by HR.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Employee registration</h1>
        <p class="subtitle">Only if your organisation has pre-onboarded your work email.</p>
        <form id="registerForm">
          <label for="regEmail">Email</label>
          <input id="regEmail" type="email" required placeholder="you@company.com" autocomplete="email" />
          <label for="regPassword">Password</label>
          <input id="regPassword" type="password" required autocomplete="new-password" />
          <label for="regName">Name (optional)</label>
          <input id="regName" placeholder="Full name" autocomplete="name" />
          <button type="submit" class="btn btn-primary">Create account</button>
        </form>
        <p id="registerMessage" class="message"></p>
        <p class="auth-back-link">Already have an account? <a href="/login">Sign in</a></p>
      </div>
    </div>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
