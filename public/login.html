<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AVGC Studios · Sign in</title>
  <link rel="stylesheet" href="/css/auth-bundle.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-inner">
        <a href="/" class="auth-brand-logo-link" aria-label="AVGC Studios home">AVGC Studios</a>
        <h2>People-first attendance &amp; leave management</h2>
        <p>Secure sign-in for employees, managers, and administrators. One portal — role-aware dashboards.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in with your AVGC Studios email. You’ll be routed to the right workspace.</p>
        <form id="loginForm">
          <label for="email">Email or employee code</label>
          <input id="email" name="email" type="text" required autocomplete="username" placeholder="you@company.com or EMP900" />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••" />
          <button type="submit" class="btn btn-primary">Sign in</button>
        </form>
        <p class="auth-forgot-wrap"><a href="/forgot-password" class="auth-forgot-link">Forgot Password?</a></p>
        <p class="auth-back-link">New here? <a href="/register">Register</a></p>
        <p id="message" class="message"></p>
      </div>
    </div>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
