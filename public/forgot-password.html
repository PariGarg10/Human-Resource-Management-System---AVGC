<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVGC · Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400&family=Roboto:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth-bundle.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-inner">
        <a href="/" class="auth-brand-logo-link" aria-label="AVGC home">AVGC</a>
        <h2>Reset your password</h2>
        <p>Enter your work email and we’ll send you a secure link valid for 15 minutes.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Forgot password?</h1>
        <p class="subtitle">Applies to all accounts — Super Admin, Admin, Director, Manager, and Employee.</p>
        <form id="forgotPasswordForm">
          <label for="forgotEmail">Registered email</label>
          <input id="forgotEmail" name="email" type="email" required autocomplete="email" placeholder="you@company.com" />
          <button type="submit" class="btn btn-primary" id="forgotSubmitBtn">Send Reset Link</button>
        </form>
        <p id="forgotMessage" class="message" role="status"></p>
        <p class="auth-back-link"><a href="/login">← Back to sign in</a></p>
      </div>
    </div>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
