<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance history · AVGC</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Attendance History</h1>
      <div>
        <a class="link-btn" href="/dashboard.html">Dashboard</a>
        <button id="logoutBtn" class="outline">Logout</button>
      </div>
    </header>

    <section class="card">
      <div class="filters">
        <label>Month <input type="number" id="month" min="1" max="12" /></label>
        <label>Year <input type="number" id="year" min="2000" max="2100" /></label>
        <button id="loadBtn">Load</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Punch In</th>
            <th>Punch Out</th>
            <th>Duration</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>

      <div id="summary" class="summary"></div>
    </section>
  </main>

  <script src="/js/history.js"></script>
</body>
</html>
