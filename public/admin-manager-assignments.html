<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager assignments · AVGC</title>
  <link rel="stylesheet" href="/css/app-bundle.built.css" />
</head>
<body>
  <div class="content-area manager-assignment-page">
    <header class="page-header manager-assignment-hero">
      <div>
        <p class="manager-assignment-kicker">Admin workspace</p>
        <h1 class="panel-title">Manager assignments</h1>
        <p class="stat-sub">Assign employees to managers and review current mappings.</p>
      </div>
      <div class="manager-assignment-actions">
        <a class="btn btn-outline btn-sm" href="/admin/dashboard">Admin dashboard</a>
        <button type="button" class="btn btn-outline btn-sm" id="logoutBtn">Sign out</button>
      </div>
    </header>
    <section id="view-manager-assignments" class="view-section is-active">
      <div class="stat-grid manager-assignment-summary" style="margin-bottom:16px;">
        <div class="stat-card"><div class="stat-label">Employees</div><div class="stat-value" id="maAssignmentTotalEmployees">—</div></div>
        <div class="stat-card stat-success"><div class="stat-label">Assigned</div><div class="stat-value" id="maAssignmentAssignedCount">—</div></div>
        <div class="stat-card stat-warning"><div class="stat-label">Unassigned</div><div class="stat-value" id="maAssignmentUnassignedCount">—</div></div>
        <div class="stat-card stat-info"><div class="stat-label">Managers</div><div class="stat-value" id="maAssignmentManagerCount">—</div></div>
      </div>
      <div class="panel manager-assignment-panel">
        <h2 class="panel-title">Filters</h2>
        <div class="filters-inline manager-assignment-filters">
          <label>Department <input id="maDepartmentFilter" placeholder="e.g. Development" /></label>
          <label>Search <input id="maSearchFilter" placeholder="name or email" /></label>
          <button type="button" class="btn btn-primary btn-sm" id="maLoadAssignmentsBtn">Apply filters</button>
        </div>
      </div>
      <div class="panel manager-assignment-panel">
        <h2 class="panel-title">Quick assign</h2>
        <form id="maSingleAssignForm" class="form-row manager-assignment-form">
          <div class="form-group"><label for="maSingleManagerSelect">Manager</label><select id="maSingleManagerSelect"></select></div>
          <div class="form-group"><label for="maSingleEmployeeSelect">Employee</label><select id="maSingleEmployeeSelect"></select></div>
          <button type="submit" class="btn btn-primary">Assign</button>
        </form>
        <p id="maSingleAssignMessage" class="message"></p>
      </div>
      <div class="panel manager-assignment-panel">
        <h2 class="panel-title">Bulk assign</h2>
        <form id="maAssignForm" class="form-row manager-assignment-form">
          <div class="form-group"><label for="maManagerSelect">Manager</label><select id="maManagerSelect"></select></div>
          <div class="form-group"><label for="maEmployeeIdsInput">Employee IDs (comma separated)</label><input id="maEmployeeIdsInput" placeholder="12, 14, 22" /></div>
          <button type="submit" class="btn btn-primary">Bulk assign</button>
        </form>
        <p id="maAssignMessage" class="message"></p>
      </div>
      <div class="panel manager-assignment-panel">
        <h2 class="panel-title">Current mapping</h2>
        <div id="maAssignmentsLoading" class="stat-sub">Loading assignments…</div>
        <div id="maAssignmentsEmpty" class="hidden stat-sub">No employees found.</div>
        <div class="table-wrap hidden" id="maAssignmentsTableWrap">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Manager</th><th></th></tr></thead>
            <tbody id="maAssignmentBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
  <script src="/js/utils.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/admin-people-modules.js"></script>
  <script src="/js/admin-manager-assignments.js"></script>
</body>
</html>
