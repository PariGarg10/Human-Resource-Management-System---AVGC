<!DOCTYPE html>
<html lang="en" class="home-landing-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="AVGC Studios — Human Resource Management System" />
  <title>AVGC Studios · HRMS</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/home-landing.css" />
</head>
<body class="home-landing">
  <div class="home-landing__page">
    <header class="home-landing__header">
      <a class="home-landing__brand" href="/" aria-label="AVGC Studios home">
        <img src="/assets/avgc-logo.png" alt="" class="home-landing__logo" aria-hidden="true" />
      </a>
      <a class="home-landing__signin" href="/login">Sign in</a>
    </header>

    <main class="home-landing__container">
      <section class="home-landing__hero" aria-label="Brand">
        <h1 class="home-landing__title">AVGC Studios</h1>
        <p class="home-landing__subtitle">Human Resource Management System</p>
      </section>

      <section class="home-landing__section" aria-labelledby="leads-heading">
        <h2 class="home-landing__section-title" id="leads-heading">Most Valuable Team Leads</h2>
        <div class="home-landing__card-row" id="homeTeamLeads"></div>
      </section>

      <section class="home-landing__section home-landing__section--last" aria-labelledby="employees-heading">
        <h2 class="home-landing__section-title" id="employees-heading">Most Valuable Employees</h2>
        <div class="home-landing__card-row home-landing__card-row--employees" id="homeTopEmployees"></div>
      </section>
    </main>
  </div>

  <script src="/js/home-landing.js"></script>
</body>
</html>
