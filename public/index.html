<!DOCTYPE html>
<html lang="en" class="home-landing-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="AVGC Studios — Human Resource Management System" />
  <title>AVGC Studios · HRMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400&family=Roboto:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/home-landing.css" />
</head>
<body class="home-landing">
  <!-- Backdrop: save your image as /public/assets/home-backdrop.jpg (or change the src below) -->
  <div class="home-landing__backdrop" id="homeBackdrop">
    <img
      class="home-landing__backdrop-img"
      id="homeBackdropImg"
      src="/assets/home-backdrop.jpg"
      alt=""
      onerror="this.classList.add('is-missing'); document.getElementById('homeBackdrop').classList.add('is-empty');"
    />
    <div class="home-landing__backdrop-slot" aria-hidden="true">
      <span>Backdrop image</span>
      <small>Add your file at <code>public/assets/home-backdrop.jpg</code><br />or edit <code>src</code> in index.html</small>
    </div>
    <div class="home-landing__backdrop-overlay"></div>
  </div>

  <div class="home-landing__content">
    <header class="home-landing__header">
      <a class="home-landing__brand" href="/" aria-label="AVGC Studios home">
        <img src="/assets/avgc-logo.png" alt="" class="home-landing__logo" aria-hidden="true" />
      </a>
      <a class="home-landing__signin" href="/login">Sign in</a>
    </header>

    <main class="home-landing__main">
      <h1 class="home-landing__title">AVGC Studios</h1>
      <p class="home-landing__subtitle">Human Resource Management System</p>
    </main>
  </div>
</body>
</html>
